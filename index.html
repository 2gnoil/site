  <!-- ══════════════════════════════════════════════════════════
       MEDIA PLAYER WEB COMPONENT
  ══════════════════════════════════════════════════════════ -->
  <script>
    class MediaPlayer extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });

        this.shadowRoot.innerHTML = `
        <style>
          :host {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 4px auto;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            position: relative;
          }

          /* ── DISPLAY AREA ── */
          #display {
            width: 100%;
            height: 220px;
            background: #111;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
          }

          #display img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
          }
          #display img.visible { display: block; }

          #display video {
            max-width: 100%;
            max-height: 100%;
            display: none;
          }
          #display video.visible { display: block; }

          #display iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
          }
          #display iframe.visible { display: block; }

          #display-placeholder {
            color: #555;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
          }

          /* ── CONTROLS BAR ── */
          #controls {
            background: #333;
            color: white;
            padding: 6px 4px;
            display: flex;
            gap: 6px;
            align-items: center;
            height: 44px;
            box-sizing: border-box;
            width: 100%;
            justify-content: flex-start;
          }

          /* ── PLAYLIST DROPDOWN ── */
          #playlist {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
            background: white;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            width: 100%;
            box-sizing: border-box;
          }
          #playlist.show {
            opacity: 1;
            visibility: visible;
          }

          .track {
            font-size: 0.85rem;
            padding: 8px 12px 8px 8px;
            cursor: pointer;
            border-bottom: 1px solid #d3d3d3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: left;
            color: #333;
          }
          .track:hover { background: #f5f5f5; }
          .track.active { background: #007cba; color: white; }

          .group-header {
            font-size: 0.85rem;
            font-weight: bold;
            background: #f0f0f0;
            padding: 8px 12px 8px 8px;
            text-align: left;
            color: #333;
            cursor: pointer;
          }
          .group-header:hover { background: #e0e0e0; }

          .new-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: bold;
            color: white;
            background: #c0392b;
            border-radius: 3px;
            padding: 1px 4px;
            margin-left: 6px;
            vertical-align: middle;
            letter-spacing: 0.03em;
          }

          /* ── TEXT ELEMENTS ── */
          #nowPlaying {
            font-size: 0.85rem;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-left: 4px;
          }
          #currentTime {
            font-size: 0.8rem;
            min-width: 80px;
          }

          /* ── SEEK BAR ── */
          #seek {
            width: 80px !important;
            height: 20px;
            flex-shrink: 0;
          }
          #seek:disabled { opacity: 0.35; cursor: not-allowed; }

          /* ── BUTTONS ── */
          button {
            height: 32px !important;
            min-width: 32px !important;
            width: auto !important;
            padding: 0 10px !important;
            margin: 0 !important;
            font-size: 14px !important;
            border: none !important;
            border-radius: 3px !important;
            background: #555 !important;
            color: white !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            box-sizing: border-box !important;
          }
          button:hover { background: #777 !important; }
          button:disabled {
            background: #3a3a3a !important;
            color: #777 !important;
            cursor: not-allowed !important;
          }

          #playPause  { width: 36px !important; padding: 0 !important; }
          #prevItem   { width: 32px !important; padding: 0 !important; }
          #nextItem   { width: 32px !important; padding: 0 !important; }
          #toggleList { width: 36px !important; padding: 0 !important; margin-right: 4px !important; }

          /* ── HIDE PLAYBACK CONTROLS in static modes ── */
          #controls.no-playback #playPause,
          #controls.no-playback #currentTime,
          #controls.no-playback #seek {
            display: none !important;
          }

          #fullscreen-btn, #newtab-btn {
            position: absolute;
            top: 6px;
            width: 26px !important;
            height: 26px !important;
            min-width: unset !important;
            padding: 0 !important;
            font-size: 13px !important;
            background: rgba(0,0,0,0.55) !important;
            color: #ddd !important;
            border-radius: 3px !important;
            opacity: 0;
            transition: opacity 0.15s ease;
            z-index: 10;
            cursor: pointer;
          }
          #fullscreen-btn { right: 6px; }
          #newtab-btn     { right: 38px; }
          #display:hover #fullscreen-btn,
          #display:hover #newtab-btn { opacity: 1; }
          #fullscreen-btn:hover,
          #newtab-btn:hover { background: rgba(0,0,0,0.85) !important; color: white !important; }

          #display:fullscreen,
          #display:-webkit-full-screen {
            background: #000;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
          }
          #display:fullscreen img,
          #display:-webkit-full-screen img,
          #display:fullscreen video,
          #display:-webkit-full-screen video {
            max-width: 100vw;
            max-height: 100vh;
          }
          #display:fullscreen iframe,
          #display:-webkit-full-screen iframe {
            width: 100vw;
            height: 100vh;
          }
        </style>

        <div id="ui">
          <!-- Display area -->
          <div id="display">
            <span id="display-placeholder"></span>
            <img id="display-img" alt="album art" />
            <video id="display-video" preload="metadata"></video>
            <iframe id="display-iframe" title="document viewer"></iframe>
            <button id="newtab-btn" title="Open in new tab">&#x2197;</button>
            <button id="fullscreen-btn" title="Fullscreen">⛶</button>
          </div>

          <!-- Controls bar -->
          <div id="controls">
            <button id="playPause">▶</button>
            <span id="currentTime" style="min-width:70px;">0:00 / 0:00</span>
            <span id="nowPlaying"></span>
            <input type="range" id="seek" min="0" max="100" value="0">
            <button id="prevItem">‹</button>
            <button id="nextItem">›</button>
            <button id="toggleList">▼</button>
          </div>

          <!-- Hidden audio element (music mode) -->
          <audio id="audio" preload="metadata"></audio>

          <!-- Playlist/filelist dropdown -->
          <div id="playlist"></div>
        </div>
        `;

        // Element refs
        this.displayEl       = this.shadowRoot.getElementById('display');
        this.displayImg      = this.shadowRoot.getElementById('display-img');
        this.displayVideo    = this.shadowRoot.getElementById('display-video');
        this.displayIframe   = this.shadowRoot.getElementById('display-iframe');
        this.displayPH       = this.shadowRoot.getElementById('display-placeholder');
        this.audioEl         = this.shadowRoot.getElementById('audio');
        this.playPauseBtn    = this.shadowRoot.getElementById('playPause');
        this.currentTimeEl   = this.shadowRoot.getElementById('currentTime');
        this.nowPlayingEl    = this.shadowRoot.getElementById('nowPlaying');
        this.seekEl          = this.shadowRoot.getElementById('seek');
        this.prevBtn         = this.shadowRoot.getElementById('prevItem');
        this.nextBtn         = this.shadowRoot.getElementById('nextItem');
        this.toggleBtn       = this.shadowRoot.getElementById('toggleList');
        this.playlistEl      = this.shadowRoot.getElementById('playlist');
        this.fullscreenBtn   = this.shadowRoot.getElementById('fullscreen-btn');
        this.newtabBtn       = this.shadowRoot.getElementById('newtab-btn');
        this.controlsEl      = this.shadowRoot.getElementById('controls');

        // State
        this.mode            = 'music';   // music | video | images | pubs
        this.items           = [];        // parsed file list for current mode
        this.currentIndex    = -1;
        this.isListOpen      = false;

        this.audioEl.volume  = 0.8;
      }

      /* ══════════════════════════════════════════
         LIFECYCLE
      ══════════════════════════════════════════ */
      connectedCallback() {
        // Audio events
        this.audioEl.addEventListener('timeupdate',    () => this.onTimeUpdate());
        this.audioEl.addEventListener('loadedmetadata',() => this.onMetaLoaded());
        this.audioEl.addEventListener('ended',         () => this.advance(1));

        // Video events
        this.displayVideo.addEventListener('timeupdate',    () => this.onTimeUpdate());
        this.displayVideo.addEventListener('loadedmetadata',() => this.onMetaLoaded());
        this.displayVideo.addEventListener('ended',         () => this.advance(1));

        // Controls
        this.playPauseBtn.addEventListener('click', () => this.togglePlay());
        this.prevBtn.addEventListener('click', () => this.advance(-1));
        this.nextBtn.addEventListener('click', () => this.advance(1));
        this.seekEl.addEventListener('input',  (e) => this.seek(Number(e.target.value)));
        this.toggleBtn.addEventListener('click', () => this.toggleList());

        // Fullscreen button
        this.fullscreenBtn.addEventListener('click', () => this.handleFullscreen());
        this.newtabBtn.addEventListener('click', () => {
          const item = this.items[this.currentIndex];
          if (item) window.open(item.url, '_blank');
        });
        document.addEventListener('fullscreenchange',       () => this.onFullscreenChange());
        document.addEventListener('webkitfullscreenchange', () => this.onFullscreenChange());

        // Load default mode
        this.switchMode('music');
      }

      /* ══════════════════════════════════════════
         MODE SWITCHING
      ══════════════════════════════════════════ */
      switchMode(mode) {
        this.mode = mode;

        // Stop any playback
        this.audioEl.pause();
        this.displayVideo.pause();

        // Clear display
        this.clearDisplay();

        // Hide playback controls for static modes
        const needsPlayback = (mode === 'music' || mode === 'video');
        this.controlsEl.classList.toggle('no-playback', !needsPlayback);
        this.playPauseBtn.disabled = !needsPlayback;
        this.seekEl.disabled       = !needsPlayback;
        this.playPauseBtn.textContent = '▶';
        this.currentTimeEl.textContent = '0:00 / 0:00';
        this.nowPlayingEl.textContent   = '';
        this.seekEl.value = 0;
        this.seekEl.max   = 100;

        this.items = [];
        this.currentIndex = -1;
        this.closeList();
        this.loadItems();
      }

      /* ══════════════════════════════════════════
         GITHUB API FETCH
      ══════════════════════════════════════════ */
      async loadItems() {
        const REPO   = '2gnoil/site';
        const BRANCH = 'main';

        const folderMap = {
          music:  'music',
          video:  'video',
          images: 'images',
          pubs:   'pubs',
        };

        const extMap = {
          music:  /\.(mp3|flac)$/i,
          video:  /\.(mp4|webm)$/i,
          images: /\.(jpg|jpeg|png|gif|webp|svg)$/i,
          pubs:   /\.pdf$/i,
        };

        const folder = folderMap[this.mode];
        const extRe  = extMap[this.mode];

        try {
          const apiUrl = `https://api.github.com/repos/${REPO}/contents/${folder}?ref=${BRANCH}`;
          const res = await fetch(apiUrl);
          if (!res.ok) throw new Error(`GitHub API ${res.status}`);
          const files = await res.json();

          const matched = files.filter(f => extRe.test(f.name));

          this.items = matched.map(f => {
            const name = decodeURIComponent(f.name);
            return {
              url:      f.download_url,
              filename: name,
              ...this.parseFilename(name, this.mode),
            };
          });

          if (this.mode === 'music') {
            this.computeAlbumDates();
            this.sortMusic();
          } else {
            this.sortGeneric();
          }

          this.renderList();

          // Auto-select first item
          if (this.items.length > 0) {
            this.loadItem(0, false);  // load but don't autoplay
          }

        } catch (err) {
          console.error('loadItems failed:', err);
          this.displayPH.textContent = 'could not load files';
        }
      }

      /* ══════════════════════════════════════════
         FILENAME PARSING
      ══════════════════════════════════════════ */
      // Music:   yyyy-mm-dd - Artist - Album - ## - Title.ext
      // Generic: yyyy-mm-dd - Group - ## - Name.ext
      parseFilename(filename, mode) {
        const clean = filename.replace(/\.[^.]+$/, ''); // strip extension
        const parts = clean.split(' - ').map(p => p.trim());

        if (mode === 'music') {
          if (parts.length >= 5 && /^\d{4}-\d{2}-\d{2}$/.test(parts[0])) {
            return {
              date:     parts[0],
              group:    parts[1],   // artist
              artist:   parts[1],
              album:    parts[2],
              trackNum: parseInt(parts[3]) || 0,
              title:    parts[4],
              label:    parts[4],
            };
          }
        } else {
          // yyyy-mm-dd - Group - ## - Name
          if (parts.length >= 4 && /^\d{4}-\d{2}-\d{2}$/.test(parts[0])) {
            return {
              date:     parts[0],
              group:    parts[1],
              trackNum: parseInt(parts[2]) || 0,
              title:    parts[3],
              label:    parts[3],
            };
          }
        }

        // Fallback
        return {
          date: '0000-00-00', group: 'Unknown',
          artist: 'Unknown', album: 'Unknown',
          trackNum: 0, title: clean, label: clean,
        };
      }

      /* ══════════════════════════════════════════
         SORTING
      ══════════════════════════════════════════ */
      computeAlbumDates() {
        // Per album: use the EARLIEST track date (preserves original logic)
        const albumDates = {};
        this.items.forEach(t => {
          const key = `${t.artist}|${t.album}`;
          if (!albumDates[key] || t.date < albumDates[key]) {
            albumDates[key] = t.date;
          }
        });
        this.items.forEach(t => {
          t.albumDate = albumDates[`${t.artist}|${t.album}`];
        });
      }

      sortMusic() {
        this.items.sort((a, b) => {
          if (a.albumDate !== b.albumDate) return b.albumDate.localeCompare(a.albumDate);
          if (a.album     !== b.album)     return a.album.localeCompare(b.album);
          return a.trackNum - b.trackNum;
        });
      }

      // Generic: groups sorted by most-recent file date in group desc,
      // then group name alpha; files within group sorted by trackNum
      sortGeneric() {
        // Compute most recent date per group
        const groupLatest = {};
        this.items.forEach(item => {
          const g = item.group;
          if (!groupLatest[g] || item.date > groupLatest[g]) {
            groupLatest[g] = item.date;
          }
        });

        this.items.sort((a, b) => {
          const latestA = groupLatest[a.group];
          const latestB = groupLatest[b.group];
          if (latestA !== latestB) return latestB.localeCompare(latestA); // newest group first
          if (a.group !== b.group) return a.group.localeCompare(b.group); // then alpha
          return a.trackNum - b.trackNum;                                  // then file order
        });
      }

      /* ══════════════════════════════════════════
         PLAYLIST RENDERING
      ══════════════════════════════════════════ */
      renderList() {
        const wasOpen = this.isListOpen;

        const now    = new Date();
        const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 30);
        const isNew  = d => d && new Date(d) >= cutoff;
        const badge  = `<span class="new-badge">NEW</span>`;

        // Build groups
        let groups;
        if (this.mode === 'music') {
          // Group by artist|album
          const map = {};
          this.items.forEach(t => {
            const key = `${t.artist}|${t.album}`;
            if (!map[key]) map[key] = { label: `${t.artist} — ${t.album}`, albumDate: t.albumDate, items: [] };
            map[key].items.push(t);
          });
          groups = Object.values(map);
        } else {
          // Group by group name
          const map = {};
          this.items.forEach(t => {
            if (!map[t.group]) map[t.group] = { label: t.group, items: [] };
            map[t.group].items.push(t);
          });
          groups = Object.values(map);
        }

        let html = '';
        let globalIdx = 0;
        groups.forEach(grp => {
          const grpHasNew = grp.items.some(t => isNew(t.date));
          const firstIdx  = globalIdx;
          html += `<div class="group-header" data-first-idx="${firstIdx}">${grp.label}${grpHasNew ? badge : ''}</div>`;
          grp.items.forEach(item => {
            html += `<div class="track" data-idx="${globalIdx}">${item.label}${isNew(item.date) ? badge : ''}</div>`;
            globalIdx++;
          });
        });

        this.playlistEl.innerHTML = html;

        // Track click
        this.playlistEl.querySelectorAll('.track').forEach(el => {
          el.addEventListener('click', () => {
            this.loadItem(parseInt(el.dataset.idx), true);
          });
        });

        // Group header → play first item in group
        this.playlistEl.querySelectorAll('.group-header').forEach(el => {
          el.addEventListener('click', () => {
            this.loadItem(parseInt(el.dataset.firstIdx), true);
          });
        });

        if (wasOpen) {
          this.playlistEl.classList.add('show');
          this.toggleBtn.textContent = '▲';
        }
      }

      /* ══════════════════════════════════════════
         LOADING & PLAYING ITEMS
      ══════════════════════════════════════════ */
      loadItem(idx, autoplay) {
        if (idx < 0 || idx >= this.items.length) return;
        this.currentIndex = idx;
        const item = this.items[idx];

        // Update now-playing label
        if (this.mode === 'music') {
          this.nowPlayingEl.textContent = `${item.artist} - ${item.title}`;
        } else {
          this.nowPlayingEl.textContent = item.label;
        }

        this.seekEl.value = 0;

        // Mode-specific load
        if      (this.mode === 'music')  this.loadAudio(item, autoplay);
        else if (this.mode === 'video')  this.loadVideo(item, autoplay);
        else if (this.mode === 'images') this.loadImage(item);
        else if (this.mode === 'pubs')   this.loadPdf(item);

        this.highlightActive(idx);
      }

      loadAudio(item, autoplay) {
        this.clearDisplay();
        this.displayPH.textContent = '';

        // Show album art
        const artUrl = this.artUrlFor(item);
        const modeAtLoad = this.mode;
        this.displayImg.src = artUrl;
        this.displayImg.classList.add('visible');
        this.displayImg.onerror = () => {
          if (this.mode !== modeAtLoad) return; // mode switched before image resolved
          this.displayImg.classList.remove('visible');
          this.displayPH.textContent = `${item.artist} — ${item.album}`;
        };

        this.audioEl.src = item.url;
        this.audioEl.load();
        this.currentTimeEl.textContent = '0:00 / 0:00';
        if (autoplay) {
          this.audioEl.play();
          this.playPauseBtn.textContent = '⏸';
        }
      }

      // Derive art URL from item metadata:
      // /music/art/Artist - Album.png
      artUrlFor(item) {
        return `./music/art/${item.artist} - ${item.album}.png`;
      }

      loadVideo(item, autoplay) {
        this.clearDisplay();
        this.displayVideo.src = item.url;
        this.displayVideo.load();
        this.displayVideo.classList.add('visible');
        this.currentTimeEl.textContent = '0:00 / 0:00';
        if (autoplay) {
          this.displayVideo.play();
          this.playPauseBtn.textContent = '⏸';
        }
      }

      loadImage(item) {
        this.clearDisplay();
        const modeAtLoad = this.mode;
        this.displayImg.src = item.url;
        this.displayImg.classList.add('visible');
        this.displayImg.onerror = () => {
          if (this.mode !== modeAtLoad) return;
          this.displayImg.classList.remove('visible');
          this.displayPH.textContent = '(image unavailable)';
        };
      }

      loadPdf(item) {
        this.clearDisplay();
        // Use PDF.js viewer hosted on Mozilla CDN for reliable inline rendering
        const viewerUrl = `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(item.url)}`;
        this.displayIframe.src = viewerUrl;
        this.displayIframe.classList.add('visible');
      }

      clearDisplay() {
        this.displayImg.classList.remove('visible');
        this.displayImg.src = '';
        this.displayVideo.classList.remove('visible');
        this.displayVideo.src = '';
        this.displayVideo.pause();
        this.displayIframe.classList.remove('visible');
        this.displayIframe.src = '';
        this.displayPH.textContent = '';
      }

      highlightActive(idx) {
        this.playlistEl.querySelectorAll('.track').forEach(el => {
          el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
        });
      }

      /* ══════════════════════════════════════════
         PLAYBACK CONTROLS
      ══════════════════════════════════════════ */
      togglePlay() {
        if (this.mode === 'music') {
          this.toggleMediaEl(this.audioEl);
        } else if (this.mode === 'video') {
          this.toggleMediaEl(this.displayVideo);
        }
      }

      toggleMediaEl(el) {
        if (el.paused) {
          el.play();
          this.playPauseBtn.textContent = '⏸';
        } else {
          el.pause();
          this.playPauseBtn.textContent = '▶';
        }
      }

      seek(val) {
        if (this.mode === 'music') this.audioEl.currentTime = val;
        else if (this.mode === 'video') this.displayVideo.currentTime = val;
      }

      advance(dir) {
        const next = this.currentIndex + dir;
        if (next >= 0 && next < this.items.length) {
          this.loadItem(next, true);
        } else if (dir > 0) {
          // End of list — stop
          if (this.mode === 'music') {
            this.audioEl.pause();
            this.audioEl.currentTime = 0;
          } else if (this.mode === 'video') {
            this.displayVideo.pause();
            this.displayVideo.currentTime = 0;
          }
          this.playPauseBtn.textContent = '▶';
        }
      }

      /* ══════════════════════════════════════════
         AUDIO/VIDEO EVENTS
      ══════════════════════════════════════════ */
      onTimeUpdate() {
        const el = (this.mode === 'music') ? this.audioEl : this.displayVideo;
        if (!isNaN(el.currentTime)) this.seekEl.value = el.currentTime;
        this.currentTimeEl.textContent = `${this.fmt(el.currentTime)} / ${this.fmt(el.duration)}`;
      }

      onMetaLoaded() {
        const el = (this.mode === 'music') ? this.audioEl : this.displayVideo;
        this.seekEl.max   = isNaN(el.duration) ? 0 : el.duration;
        this.seekEl.value = 0;
        this.currentTimeEl.textContent = `0:00 / ${this.fmt(el.duration)}`;
      }

      fmt(s) {
        if (isNaN(s) || s == null) return '0:00';
        const m = Math.floor(s / 60);
        return `${m}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
      }

      /* ══════════════════════════════════════════
         FULLSCREEN
      ══════════════════════════════════════════ */
      handleFullscreen() {
        if (this.mode === 'pubs') {
          // Open PDF in new tab instead of fullscreening the iframe
          const item = this.items[this.currentIndex];
          if (item) window.open(item.url, '_blank');
          return;
        }
        const el = this.displayEl;
        if (el.requestFullscreen)       el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      }

      onFullscreenChange() {
        const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
        this.fullscreenBtn.textContent = fsEl ? '✕' : '⛶';
        this.fullscreenBtn.title       = fsEl ? 'Exit fullscreen' : 'Fullscreen';
      }

      /* ══════════════════════════════════════════
         PLAYLIST TOGGLE
      ══════════════════════════════════════════ */
      toggleList() {
        this.isListOpen = !this.isListOpen;
        this.playlistEl.classList.toggle('show', this.isListOpen);
        this.toggleBtn.textContent = this.isListOpen ? '▲' : '▼';
      }

      closeList() {
        this.isListOpen = false;
        this.playlistEl.classList.remove('show');
        this.toggleBtn.textContent = '▼';
      }
    }

    customElements.define('media-player', MediaPlayer);

    /* ══════════════════════════════════════════
       MODE TOGGLE WIRING (outside shadow DOM)
    ══════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      const player    = document.querySelector('media-player');
      const modeLinks = document.querySelectorAll('.mode-link');

      modeLinks.forEach(btn => {
        btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          modeLinks.forEach(b => b.classList.toggle('active', b === btn));
          player.switchMode(mode);
        });
      });

      // Dropdown toggles for games / tools
      document.querySelectorAll('.dropdown-toggle').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const menu = btn.nextElementSibling;
          const isOpen = menu.classList.contains('open');

          // Close all dropdowns first
          document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
          document.querySelectorAll('.dropdown-toggle').forEach(b => b.classList.remove('open'));

          // Toggle this one
          if (!isOpen) {
            menu.classList.add('open');
            btn.classList.add('open');
          }
        });
      });

      // Close dropdowns when clicking outside
      document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.dropdown-toggle').forEach(b => b.classList.remove('open'));
      });
    });
  </script>

  <!-- ══════════════════════════════════════════════════════════
       BLOG VIEWER (unchanged)
  ══════════════════════════════════════════════════════════ -->
  <script>
    let allEntries = [];
    let entries    = [];
    let currentIndex = 0;
    let categories = [];
    let currentFilter = "all";

    const box       = document.getElementById("blog-box");
    const prevBtn   = document.getElementById("prev-btn");
    const nextBtn   = document.getElementById("next-btn");
    const randomBtn = document.getElementById("random-btn");
    const categoryBar = document.getElementById("category-bar");

    const VISIBLE_CATEGORIES = [
      "poetry",
      "fiction",
      "musings",
    ];

    function showEntry(index) {
      if (index < 0 || index >= entries.length) return;
      currentIndex = index;
      prevBtn.disabled   = (currentIndex === 0);
      nextBtn.disabled   = (currentIndex === entries.length - 1);
      randomBtn.disabled = (entries.length === 0);
      const entry = entries[currentIndex];
      box.textContent = entry.text;
      box.scrollTop = 0;
    }

    function applyFilter(category) {
      currentFilter = category;
      entries = (category === "all")
        ? allEntries.filter(e => e.isBlog)
        : allEntries.filter(e => e.isBlog && e.categories.includes(category));
      updateActiveFilterUI();
      if (entries.length === 0) { box.textContent = "No entries for this category."; return; }
      entries.sort((a, b) => b.date.localeCompare(a.date));
      showEntry(0);
    }

    function updateActiveFilterUI() {
      document.querySelectorAll(".filter-link").forEach(link => {
        link.classList.toggle('active', link.dataset.category === currentFilter);
      });
    }

    function renderCategoryButtons() {
      categoryBar.innerHTML = "";
      function createLink(label, category) {
        const link = document.createElement("button");
        link.textContent = label;
        link.className = "filter-link";
        link.dataset.category = category;
        link.onclick = () => applyFilter(category);
        return link;
      }
      categoryBar.appendChild(createLink("all", "all"));
      categories.filter(c => VISIBLE_CATEGORIES.includes(c))
                .forEach(c => categoryBar.appendChild(createLink(c, c)));
      updateActiveFilterUI();
    }

    async function initBlogViewer() {
      try {
        const response = await fetch("!repo.csv");
        if (!response.ok) { box.textContent = "Could not load CSV file"; return; }
        const csvText = await response.text();
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
        const headers = parsed.meta.fields;
        const excluded = ["Text", "date"];
        categories = headers.filter(h => !excluded.includes(h));
        allEntries = parsed.data.map(row => ({
          date:       row.date?.trim(),
          text:       (row.date?.trim() || "") + "\n" + (row.Text || ""),
          categories: categories.filter(cat => row[cat]?.trim() === "x"),
          isBlog:     row.blog?.trim() === "x"
        }));
        entries = allEntries.filter(e => e.isBlog);
        if (entries.length === 0) { box.textContent = "No blog entries found."; return; }
        entries.sort((a, b) => b.date.localeCompare(a.date));
        renderCategoryButtons();
        showEntry(0);
      } catch (e) {
        box.textContent = "Error: " + e.message;
      }
    }

    prevBtn.addEventListener("click",   () => showEntry(currentIndex - 1));
    nextBtn.addEventListener("click",   () => showEntry(currentIndex + 1));
    randomBtn.addEventListener("click", () => {
      if (entries.length > 0) showEntry(Math.floor(Math.random() * entries.length));
    });

    initBlogViewer();
  </script>

</body>
